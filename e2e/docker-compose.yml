# E2E test stack: MariaDB + Redmine (with plugin) + Gitea + sync service + pytest.
#
# Run all tests:
#   docker compose up -d --build && docker compose wait tests
#
# Tear down completely (including named volumes):
#   docker compose down -v

services:

  # ── database for Redmine ────────────────────────────────────────────────────
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: redmine
      MYSQL_USER: redmine
      MYSQL_PASSWORD: redmine_password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Redmine with the redmine_repository_api plugin ─────────────────────────
  redmine:
    build:
      context: .
      dockerfile: Dockerfile.redmine
    environment:
      REDMINE_DB_MYSQL: db
      REDMINE_DB_DATABASE: redmine
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: redmine_password
      REDMINE_SECRET_KEY_BASE: e2etestsecretkey1234567890abcdef1234
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  # ── Gitea git hosting ───────────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:latest
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__DOMAIN: gitea
      GITEA__server__ROOT_URL: http://gitea:3000/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__SECRET_KEY: e2etestsecretkey1234567890abcdef
      GITEA__security__LFS_JWT_SECRET: e2etestlfsjwtsecret123456789012
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__service__REGISTER_EMAIL_CONFIRM: "false"
      GITEA__mailer__ENABLED: "false"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # One-shot: create the Gitea admin user via the CLI.
  # Runs as "git" (the Gitea service user) so it can write to the SQLite DB.
  # Uses "|| true" so it exits 0 whether the user was created or already existed.
  gitea-init:
    image: gitea/gitea:latest
    user: git
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        gitea admin user create \
          --admin \
          --username testadmin \
          --password 'Password1!' \
          --email admin@test.local \
          --must-change-password=false || true
    environment:
      GITEA_APP_INI: /data/gitea/conf/app.ini
      GITEA_WORK_DIR: /data/gitea
    volumes:
      - gitea-data:/data
    depends_on:
      gitea:
        condition: service_healthy
    restart: "no"

  # ── the service under test ──────────────────────────────────────────────────
  sync:
    build:
      context: ..
      dockerfile: Dockerfile
    # Run as root so it can write into the shared repos volume (e2e only).
    user: "0"
    environment:
      REDMINE_URL: http://redmine:3000
      REDMINE_API_KEY: testAPIkeyTHROWAWAY123456
      GITEA_WEBHOOK_SECRET: ""
      CACHE_TTL: "5"
      # Keep the reconcile loop quiet; tests trigger syncs via the webhook.
      RECONCILE_INTERVAL: "9999"
    volumes:
      - repos:/repos
    depends_on:
      redmine:
        condition: service_healthy
      gitea-init:
        condition: service_completed_successfully
    healthcheck:
      # python:3.13-slim does not include curl; use the interpreter instead.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── pytest runner ───────────────────────────────────────────────────────────
  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    environment:
      REDMINE_URL: http://redmine:3000
      REDMINE_API_KEY: testAPIkeyTHROWAWAY123456
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_USER: testadmin
      GITEA_ADMIN_PASS: Password1!
      SYNC_URL: http://sync:8000
      DB_HOST: db
      DB_USER: redmine
      DB_PASSWORD: redmine_password
      DB_NAME: redmine
    volumes:
      # Shared with sync so tests can inspect cloned bare repos directly.
      - repos:/repos
    depends_on:
      sync:
        condition: service_healthy
      gitea-init:
        condition: service_completed_successfully

volumes:
  gitea-data:
  repos:
